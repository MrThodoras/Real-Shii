<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Submited Successfully </title>
    <link rel="stylesheet" href="styles.css">
</head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

.confirmation-box {
    background-color: #333;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    max-width: 600px;
    width: 100%;
}

h1 {
    font-size: 24px;
    color: #4CAF50;
    margin-bottom: 10px;
}

p {
    font-size: 16px;
    color: #bdadad;
}

.checkmark {
    font-size: 48px;
    color: #4CAF50;
    margin: 20px 0;
}

.back-home {
    font-size: 16px;
    color: #4CAF50;
    text-decoration: none;
    border: 1px solid #4CAF50;
    padding: 10px 20px;
    border-radius: 5px;
    transition: background-color 0.3s ease;
}

.back-home:hover {
    background-color: #4CAF50;
    color: white;
}

</style>

<style>
 .logo {
    text-align: center; /* Center the image horizontally */
    margin-top: -100px;
    margin-bottom: 100px /* Add space below the logo */
}

.logo img {
    max-width: 200px; /* Set a max width for the logo (adjust as needed) */
    height: auto; /* Maintain aspect ratio */
}
</style>

<body>
<div class="container">
    <div class="logo">
       <img src="logo.png" alt="Real Shit Records Logo">
     </div>

    <div class="container">
        <div class="confirmation-box">
            <h1>Thank you for your Submission!</h1>
            <p><b>Real Shit Records</b> has received your form</p>
            <div class="checkmark">&#10004;</div>
            <p>We will get back to you shortly!</p>
            <br><br>
            <a href="index.html" class="back-home">Back to Mainpage</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
